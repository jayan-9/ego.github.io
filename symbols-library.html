    ];

    // Render categories and symbols
    const container = document.getElementById('categoriesContainer');
    let allSymbols = [];

    function renderCategories(filterText = '') {
        container.innerHTML = '';
        let hasVisible = false;
        for (const [category, symbols] of Object.entries(symbolsData)) {
            const filtered = symbols.filter(sym => sym.toLowerCase().includes(filterText.toLowerCase()));
            if (filtered.length === 0) continue;
            hasVisible = true;
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'category-section';
            sectionDiv.innerHTML = `<h2 class="category-title">${category}</h2><div class="symbols-grid" id="grid-${category.replace(/\s/g, '')}"></div>`;
            container.appendChild(sectionDiv);
            const grid = sectionDiv.querySelector('.symbols-grid');
            filtered.forEach(sym => {
                const card = document.createElement('div');
                card.className = 'symbol-card';
                card.textContent = sym;
                card.setAttribute('data-symbol', sym);
                card.addEventListener('click', () => copyToClipboard(sym));
                grid.appendChild(card);
                allSymbols.push(sym);
            });
        }
        if (!hasVisible) {
            container.innerHTML = '<div class="no-results">😔 No symbols found. Try a different search term.</div>';
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toastMsg');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }).catch(() => alert('Failed to copy'));
    }

    // Search functionality
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearchBtn');
    searchInput.addEventListener('input', (e) => {
        renderCategories(e.target.value);
    });
    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        renderCategories('');
    });

    // Initial render
    renderCategories('');

    // Optional: theme toggle (adds dark mode if you want, but not mandatory)

    const toggleThemeBtn = document.createElement('button');
    toggleThemeBtn.innerHTML = '<i class="fas fa-moon"></i>';
    toggleThemeBtn.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#4f46e5; color:white; border:none; width:50px; height:50px; border-radius:50%; cursor:pointer; z-index:1000; box-shadow:0 2px 8px rgba(0,0,0,0.2);';
    toggleThemeBtn.onclick = () => {
        document.body.classList.toggle('dark-theme');
        localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
    };
    document.body.appendChild(toggleThemeBtn);
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
